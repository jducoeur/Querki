# Config values for the in-memory Scanrio Test Querki environment
# This gets merged into the main values in application.conf in the real running env.
# Settings in here should generally match those for Prod, *but* any settings that would
# be a secret in Prod go in here -- there is no SecretsManager during scenario testing,
# so we just put test values (which should be ENTIRELY FAKE) in here.

scenario {
  querki {
    akka {
      # The default timeout unless stated otherwise:
      timeout: 1 minute
    }

    app {
      urlRoot: "https://test.querki.net/"
    }

    apps {
      chunksize : 10000
    }

    aws {
      bucket : "querki-test"
      bucketUrl : "//s3-us-west-2.amazonaws.com/querki-test"
      region : "us-east-1"
      # The name of the HOCON file in Secrets Manager that contains the configuration for the secrets:
      # Intentionally unset for the Scenario Tests, which tells us that we won't be using the Secrets
      # Manager for anything:
      # secretsName : ""
    }

    cluster {
      # How many nodes do we expect in this cluster?
      # For now, we've dropped to single-node, for ease of development. We'll eventually want to scale this
      # back up to a proper cluster.
      size : 1
      # How long we allow for re-finding a Shard before we decide it is dead:
      shardRelookupTimeout : 10 minutes
      # How often should the QuerkiNodeCoordinator save a snapshot:
      snapshotInterval : 100
      # The number of OIDs to reserve at a time. This is a serious tuning parameter. Higher
      # means better latency for OID allocation requests, at the cost of more gaps in the
      # OID namespace.
      allocBlockSize : 10
      # How often to snapshot the state of each OIDAllocator, in blocks.
      allocSnapshotInterval : 10
      # Signal to use the Cassandra machinery to allocate OIDs.
      newObjCreate : true
      # Split-brain config parameters:
      unreachable {
        timeout : 120 seconds
      }
    }

    conversations {
      timeout : 3 minutes
    }

    debug {
      space {
      }
    }

    history {
      timeout : 15 minutes
    }

    mail {
      # Tell the Email Ecot to use the test version of the sender, which doesn't actually send
      # mail, but instead lets us inspect what has been "sent":
      test : true
      smtpHost : "email-smtp.us-east-1.amazonaws.com"
      # TODO: is this right? It's from the old running system, but the code seems to want "port", not "smtpPort". Odd...
      smtpPort : 25
      from : "userEmails@querki.net"
      systemFrom : "querki-test@querki.net"
      systemName : "Querki"
      debug : false
      identityTimeout : 5 minutes
      # Don't bother to throttle emails significantly:
      throttle : 10 ms
    }

    # TODO: these were named "public" because they were originally the only publicly-visible parts of config.
    # That's no longer true, so move these to a more appropriate name.
    public {
      maxSpaces : 500
      maxMembersPerSpace : 500
    }

    publication {
      log : false
    }

    redirect {
      from : "www.querki.net"
      to : "https://querki.net"
    }

    session {
      # Time before a UserSession times out for inactivity
      timeout : 5 minutes
    }

    space {
      # Time before a Space times out for inactivity
      timeout : 30 minutes
      snapshotInterval : 100
      newPersist : true
    }

    stream {
      stringChunkSize : 10000
    }

    test {
      inmemory : true
    }

    userSession {
      timeout : 30 minutes
      collaborators : {
        timeout : 15 minutes
      }
    }
  }

  # TODO: this is bad! We really need to settle on a better serializer, rather
  # than ignoring the warning like this! Now that we've dropped down to single-node,
  # it's a good time to fix this.
  akka.actor.warn-about-java-serializer-usage : false

  akka {

    remote {
      artery {
        canonical {
          hostname = "127.0.0.1"
          port = 2553
        }
      }
      #netty.tcp {
      #  port = 2553
      #}
    }

    cluster {
      seed-nodes = [
        "akka://application@127.0.0.1:2553"
      ]
    }

    actor {
      provider = "cluster"
    }
  }

  # For scenario testing, we use the H2 in-memory database, in MySQL emulation mode:
  db.system.driver=org.h2.Driver
  db.system.url="jdbc:h2:mem:system;MODE=MYSQL"
  db.system.logStatements=false

  db.user.driver=org.h2.Driver
  db.user.url="jdbc:h2:mem:user;MODE=MYSQL"
  db.user.logStatements=false

  play-akka {
    akka {
      remote {
        artery {
          canonical {
            hostname = "127.0.0.1"
            port = 2552
          }
        }
        #netty.tcp {
        #  port = 2553
        #}
      }

      cluster {
        seed-nodes = [
          "akka://application@127.0.0.1:2552"
        ]
      }
    }
  }

  play.http.session {
    # Require HTTPS for all sessions in Prod:
    secure : true
  }

  # Theoretically, this should preserve the original request address:
  trustxforwarded=true

  # From application.test.conf, needed for debugging in IDE:
  akka {
    persistence {
      journal.plugin = "inmemory-journal"
      snapshot-store.plugin = "inmemory-snapshot-store"
    }

    cluster {
      sharding {
        journal-plugin-id = "inmemory-journal"
        snapshot-plugin-id = "inmemory-snapshot-store"
      }
    }
  }

  inmemory-journal {
    circuit-breaker {
      max-failures = 10
      call-timeout = 600s
      reset-timeout = 30s
    }
  }

  inmemory-read-journal {
    # New events are retrieved (polled) with this interval.
    refresh-interval = "100ms"

    offset-mode = "sequence"

    # Absolute path to the write journal plugin configuration section
    write-plugin = "inmemory-journal"

    # How many events to fetch in one query (replay) and keep buffered until they
    # are delivered downstreams.
    max-buffer-size = "5000"
  }

}
